<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Edlawit Heart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const words = [];
    const wordText = "i love you";
    const centerName = "EDLAWIT";
    const totalWords = 50; // ቃላቶቹ ተራርቀው እንዲታዩ

    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 13, y: y * 13 };
    }

    class Particle {
        constructor(index) {
            this.t = (index / totalWords) * Math.PI * 2;
            this.speed = 0.02; // የሩጫ ፍጥነት
        }

        update() {
            this.t += this.speed;
        }

        draw() {
            const pos = getHeartPoint(this.t);
            const x = canvas.width / 2 + pos.x;
            const y = canvas.height / 2 + pos.y;

            // ቃላቶቹ ደማቅ ሮዝ እንዲሆኑ
            ctx.font = "bold 16px Arial";
            ctx.fillStyle = "#ff2d95"; 
            ctx.textAlign = "center";
            ctx.fillText(wordText, x, y);
        }
    }

    for (let i = 0; i < totalWords; i++) {
        words.push(new Particle(i));
    }

    function animate() {
        // ቁልፉ ምስጢር እዚህ ጋር ነው፡ ሙሉ በሙሉ አናጠፋውም 
        // በትንሹ ግልጽ (0.1) የሆነ ጥቁር ቀለም በመቀባት የ"ጥላ" (Trail) ውጤት እንፈጥራለን
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // መሃል ላይ ያለው ስም - ልክ እንደ ቪዲዮው Glow እንዲኖረው
        ctx.save();
        ctx.shadowBlur = 25;
        ctx.shadowColor = "#ff2d95";
        ctx.fillStyle = "white";
        ctx.font = "bold 55px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(centerName, canvas.width / 2, canvas.height / 2);
        ctx.restore();

        words.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
